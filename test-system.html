<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园快递代取系统 - 演示界面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .login-form {
            padding: 40px 30px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e0e0e0;
        }
        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #999;
            font-size: 14px;
        }
        .test-accounts {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }
        .test-accounts h3 {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .account-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .account-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }
        .account-item strong {
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }
        .account-item div {
            font-size: 13px;
            color: #666;
        }
        .status-bar {
            background: #e8f5e9;
            padding: 15px 30px;
            border-top: 1px solid #c8e6c9;
        }
        .status-bar .status {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2e7d32;
            font-size: 14px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .result-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .result-message.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        .result-message.error {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚚 校园快递代取</h1>
            <p>安全 · 便捷 · 高效的校园快递服务</p>
        </div>

        <div class="login-form">
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="text" id="phone" placeholder="请输入手机号" value="13800138000">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" value="user123">
            </div>

            <button class="btn-login" onclick="handleLogin()">登 录</button>

            <div id="resultMessage" class="result-message"></div>

            <div class="divider">
                <span>快捷测试账号</span>
            </div>

            <div class="test-accounts">
                <h3>👥 点击快速登录</h3>

                <div class="account-item" onclick="quickLogin('13800138000', 'user123')">
                    <strong>👤 普通用户</strong>
                    <div>手机：13800138000 | 密码：user123</div>
                </div>

                <div class="account-item" onclick="quickLogin('13900139000', 'courier123')">
                    <strong>📦 代取员</strong>
                    <div>手机：13900139000 | 密码：courier123</div>
                </div>

                <div class="account-item" onclick="quickLogin('admin', 'admin123')">
                    <strong>👑 管理员</strong>
                    <div>账号：admin | 密码：admin123</div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status">
                <div class="status-dot"></div>
                <span>后端服务运行中 · 端口：8080</span>
            </div>
        </div>
    </div>

    <script>
        function quickLogin(phone, password) {
            document.getElementById('phone').value = phone;
            document.getElementById('password').value = password;
            handleLogin();
        }

        async function handleLogin() {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('resultMessage');

            if (!phone || !password) {
                resultDiv.className = 'result-message error';
                resultDiv.textContent = '❌ 手机号和密码不能为空';
                return;
            }

            resultDiv.className = 'result-message';
            resultDiv.textContent = '⏳ 正在登录...';

            try {
                const response = await fetch('http://localhost:8080/api/user/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phone, password })
                });

                const data = await response.json();

                if (data.code === 200) {
                    resultDiv.className = 'result-message success';
                    resultDiv.innerHTML = `
                        ✅ 登录成功！<br>
                        欢迎，${data.data.nickname}<br>
                        <small>Token: ${data.data.token.substring(0, 20)}...</small>
                    `;

                    // 保存 token 到 localStorage
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('userId', data.data.userId);
                    localStorage.setItem('role', data.data.role);
                    localStorage.setItem('nickname', data.data.nickname);

                    setTimeout(() => {
                        window.location.href = '#dashboard';
                    }, 1500);
                } else {
                    resultDiv.className = 'result-message error';
                    resultDiv.textContent = '❌ ' + (data.message || '登录失败');
                }
            } catch (error) {
                resultDiv.className = 'result-message error';
                resultDiv.textContent = '❌ 网络错误：' + error.message;
            }
        }

        // 支持按回车键登录
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('password').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });
        });
    </script>
</body>
</html>
