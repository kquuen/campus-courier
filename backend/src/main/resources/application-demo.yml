server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:campus_courier;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
  
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false
  
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
  
  sql:
    init:
      mode: always
      schema-locations: classpath:init-h2.sql
      data-locations: classpath:data-h2.sql
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  jwt:
    secret: campus-courier-secret-key-2024-very-long-string
    expiration: 86400000   # 24小时，毫秒
  upload:
    path: ./uploads/

logging:
  level:
    com.campus.courier: debug
    org.springframework.jdbc.core.JdbcTemplate: debug