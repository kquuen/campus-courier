server:
  port: 8082
  shutdown: graceful
  # HTTPS配置（暂时禁用以启动应用）
  # ssl:
  #   enabled: true
  #   key-store: classpath:keystore.p12
  #   key-store-password: changeit
  #   key-alias: tomcat

spring:
  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 10MB

  datasource:
    url: jdbc:mysql://localhost:3306/campus_courier?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  sql:
    init:
      mode: never
      schema-locations: classpath:init-mysql.sql
      data-locations: classpath:data-mysql.sql

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
    # Redis缓存配置
    cache:
      type: redis
      redis:
        time-to-live: 3600000  # 默认缓存1小时
        key-prefix: "campus:courier:"
      cache-names:
        - orders
        - users
        - user-profile
        - order-details
        - order-list

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  jwt:
    secret: campus-courier-secret-key-2024-very-long-string
    expiration: 86400000   # 24小时，毫秒
    refreshExpiration: 604800000  # 7天，毫秒
  upload:
    dir: ${user.home}/campus-courier-uploads
    max-bytes: 5242880
  campus:
    identity:
      # 关闭则不校验学号/姓名；开启且 whitelist 为空时仅格式校验；whitelist 非空则须与白名单完全一致（演示校方备案）
      enabled: true
      whitelist: []
  # 阶段 A：开发环境可在响应中返回验证码便于联调；生产务必 false
  security:
    expose-password-reset-code: true

logging:
  level:
    com.campus.courier: debug