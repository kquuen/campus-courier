server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_courier?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  sql:
    init:
      mode: always
      schema-locations: classpath:init-mysql.sql
      data-locations: classpath:data-mysql.sql

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: campus-courier-secret-key-2024-very-long-string
    expiration: 86400000   # 24小时，毫秒
    refreshExpiration: 604800000  # 7天，毫秒